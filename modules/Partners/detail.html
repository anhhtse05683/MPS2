<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="partners.detailTitle">Chi tiết Khách hàng / Nhà cung cấp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="/modules/assets/js/auth.js"></script>
    <script src="/modules/assets/js/i18n.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #f8fafc 100%);
            min-height: 100vh;
            padding: 1.5rem;
        }

        .card {
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(14, 165, 233, 0.12);
            border: none;
            margin-bottom: 1.5rem;
        }

        .card-header-custom {
            background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
            color: white;
            padding: 1.25rem 1.5rem;
            border-radius: 20px 20px 0 0;
            border: none;
        }

        .card-header-custom h5 {
            margin: 0;
            font-weight: 600;
        }

        .form-label {
            font-weight: 500;
            color: #334155;
        }

        .meta-section {
            background: #f8fafc;
            border-radius: 12px;
            padding: 1rem;
            font-size: 0.875rem;
            color: #64748b;
        }
    </style>
</head>

<body>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <a href="/modules/Partners/index.html" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i><span data-i18n="partners.backToList">Quay lại danh sách</span>
        </a>
        <div>
            <button id="btnSave" class="btn btn-primary">
                <i class="bi bi-save me-1"></i><span data-i18n="partners.save">Lưu</span>
            </button>
            <button id="btnCancel" class="btn btn-outline-secondary">
                <i class="bi bi-x-lg me-1"></i><span data-i18n="partners.cancel">Hủy</span>
            </button>
        </div>
    </div>

    <div class="card">
        <div class="card-header-custom">
            <h5><i class="bi bi-person-badge me-2"></i><span data-i18n="partners.orderInfo">Thông tin Khách hàng / Nhà
                    cung cấp</span></h5>
        </div>
        <div class="card-body p-4">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label"><span data-i18n="partners.form.code">Mã</span> <span
                            class="text-danger">*</span></label>
                    <input type="text" id="code" class="form-control" data-i18n="partners.form.codePlaceholder"
                        placeholder="VD: CUST001, SUP001">
                </div>
                <div class="col-md-4">
                    <label class="form-label"><span data-i18n="partners.form.name">Tên</span> <span
                            class="text-danger">*</span></label>
                    <input type="text" id="name" class="form-control" data-i18n="partners.form.namePlaceholder"
                        placeholder="Tên đầy đủ">
                </div>
                <div class="col-md-4">
                    <label class="form-label"><span data-i18n="partners.form.type">Loại</span> <span
                            class="text-danger">*</span></label>
                    <select id="type" class="form-select">
                        <option value="C" data-i18n="partners.typeCustomer">Khách hàng</option>
                        <option value="S" data-i18n="partners.typeSupplier">Nhà cung cấp</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label" data-i18n="partners.form.taxCode">Mã số thuế</label>
                    <input type="text" id="taxCode" class="form-control" data-i18n="partners.form.taxCodePlaceholder"
                        placeholder="MST">
                </div>
                <div class="col-md-4">
                    <label class="form-label" data-i18n="partners.form.representative">Người đại diện</label>
                    <input type="text" id="representative" class="form-control"
                        data-i18n="partners.form.representativePlaceholder" placeholder="Họ tên người đại diện">
                </div>
                <div class="col-md-4">
                    <label class="form-label" data-i18n="partners.form.phone">Số điện thoại</label>
                    <input type="text" id="phone" class="form-control" data-i18n="partners.form.phonePlaceholder"
                        placeholder="SĐT">
                </div>
                <div class="col-md-6">
                    <label class="form-label" data-i18n="partners.form.email">Email</label>
                    <input type="email" id="email" class="form-control" data-i18n="partners.form.emailPlaceholder"
                        placeholder="email@example.com">
                </div>
                <div class="col-md-6">
                    <label class="form-label" data-i18n="partners.form.address">Địa chỉ</label>
                    <input type="text" id="address" class="form-control" data-i18n="partners.form.addressPlaceholder"
                        placeholder="Địa chỉ đầy đủ">
                </div>
                <div class="col-md-4">
                    <label class="form-label" data-i18n="partners.form.country">Quốc gia</label>
                    <select id="country" class="form-select">
                        <option value="" data-i18n="partners.countryNotSelected">— Chưa chọn —</option>
                        <option value="VN" data-i18n="partners.countries.VN">Việt Nam</option>
                        <option value="US" data-i18n="partners.countries.US">Hoa Kỳ</option>
                        <option value="JP" data-i18n="partners.countries.JP">Nhật Bản</option>
                        <option value="KR" data-i18n="partners.countries.KR">Hàn Quốc</option>
                        <option value="CN" data-i18n="partners.countries.CN">Trung Quốc</option>
                        <option value="SG" data-i18n="partners.countries.SG">Singapore</option>
                        <option value="TH" data-i18n="partners.countries.TH">Thái Lan</option>
                        <option value="MY" data-i18n="partners.countries.MY">Malaysia</option>
                        <option value="ID" data-i18n="partners.countries.ID">Indonesia</option>
                        <option value="PH" data-i18n="partners.countries.PH">Philippines</option>
                        <option value="TW" data-i18n="partners.countries.TW">Đài Loan</option>
                        <option value="HK" data-i18n="partners.countries.HK">Hồng Kông</option>
                        <option value="IN" data-i18n="partners.countries.IN">Ấn Độ</option>
                        <option value="DE" data-i18n="partners.countries.DE">Đức</option>
                        <option value="FR" data-i18n="partners.countries.FR">Pháp</option>
                        <option value="GB" data-i18n="partners.countries.GB">Anh</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label" data-i18n="partners.form.invoiceLanguage">Ngôn ngữ Invoice</label>
                    <select id="invoiceLanguage" class="form-select">
                        <option value="vi" data-i18n="partners.invoiceLang.vi">Tiếng Việt</option>
                        <option value="en" data-i18n="partners.invoiceLang.en">English</option>
                    </select>
                    <small class="text-muted" data-i18n="partners.form.invoiceLanguageHint">Tự động: VN→Việt, khác→English</small>
                </div>
            </div>

            <div id="metaSection" class="meta-section mt-4" style="display: none;">
                <div class="row g-2 small">
                    <div class="col-md-6"><strong data-i18n="partners.meta.createdBy">Người tạo:</strong> <span
                            id="createdBy">-</span></div>
                    <div class="col-md-6"><strong data-i18n="partners.meta.createdAt">Thời gian tạo:</strong> <span
                            id="createdAt">-</span></div>
                    <div class="col-md-6"><strong data-i18n="partners.meta.updatedBy">Người chỉnh sửa cuối:</strong>
                        <span id="updatedBy">-</span>
                    </div>
                    <div class="col-md-6"><strong data-i18n="partners.meta.updatedAt">Thời gian chỉnh sửa cuối:</strong>
                        <span id="updatedAt">-</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let partnerId = null;
        const urlParams = new URLSearchParams(window.location.search);
        partnerId = urlParams.get("id") ? parseInt(urlParams.get("id")) : null;

        function formatDate(dateStr) {
            if (!dateStr) return "-";
            return new Date(dateStr).toLocaleString("vi-VN", { day: "2-digit", month: "2-digit", year: "numeric", hour: "2-digit", minute: "2-digit" });
        }

        async function fetchJson(url, options = {}) {
            const res = await fetch(url, options);
            if (!res.ok) {
                const err = await res.json().catch(() => ({ error: "Request failed" }));
                throw new Error(err.error || "Request failed");
            }
            return res.json();
        }

        function syncInvoiceLanguageFromCountry() {
            const country = document.getElementById("country").value;
            const langSelect = document.getElementById("invoiceLanguage");
            if (country === "VN") {
                langSelect.value = "vi";
            } else if (country) {
                langSelect.value = "en";
            } else {
                langSelect.value = "en";
            }
        }

        function ensureCountryOption(code) {
            if (!code) return;
            const sel = document.getElementById("country");
            if (sel.querySelector(`option[value="${code}"]`)) return;
            const opt = document.createElement("option");
            opt.value = code;
            opt.textContent = code;
            sel.appendChild(opt);
        }

        async function loadPartner() {
            if (!partnerId) {
                document.getElementById("metaSection").style.display = "none";
                syncInvoiceLanguageFromCountry();
                return;
            }
            try {
                const p = await fetchJson(`/api/partners/${partnerId}`);
                document.getElementById("code").value = p.code || "";
                document.getElementById("name").value = p.name || "";
                document.getElementById("type").value = p.type || "C";
                document.getElementById("taxCode").value = p.taxCode || "";
                document.getElementById("representative").value = p.representative || "";
                document.getElementById("phone").value = p.phone || "";
                document.getElementById("email").value = p.email || "";
                document.getElementById("address").value = p.address || "";

                const countryVal = (p.country || "").toUpperCase().slice(0, 2);
                ensureCountryOption(countryVal);
                document.getElementById("country").value = countryVal || "";
                document.getElementById("invoiceLanguage").value = p.invoiceLanguage || (countryVal === "VN" ? "vi" : "en");

                document.getElementById("createdBy").textContent = p.createdBy || "-";
                document.getElementById("createdAt").textContent = formatDate(p.createdAt);
                document.getElementById("updatedBy").textContent = p.updatedBy || "-";
                document.getElementById("updatedAt").textContent = formatDate(p.updatedAt);
                document.getElementById("metaSection").style.display = "block";
            } catch (err) {
                alert((window.I18n?.t("partners.loadError") || "Lỗi tải dữ liệu: ") + err.message);
                window.location.href = "/modules/Partners/index.html";
            }
        }

        document.getElementById("btnSave").addEventListener("click", async () => {
            const code = document.getElementById("code").value.trim();
            const name = document.getElementById("name").value.trim();
            if (!code || !name) {
                alert(window.I18n?.t("partners.validationCodeName") || "Vui lòng nhập Mã và Tên");
                return;
            }

            const currentUser = window.Auth?.getUser?.();
            const userDisplay = currentUser?.fullName || currentUser?.username || null;
            const payload = {
                code,
                name,
                type: document.getElementById("type").value,
                taxCode: document.getElementById("taxCode").value.trim() || null,
                representative: document.getElementById("representative").value.trim() || null,
                phone: document.getElementById("phone").value.trim() || null,
                email: document.getElementById("email").value.trim() || null,
                address: document.getElementById("address").value.trim() || null,
                country: document.getElementById("country").value?.trim().toUpperCase().slice(0, 2) || null,
                invoiceLanguage: document.getElementById("invoiceLanguage").value || null,
                createdBy: userDisplay,
                updatedBy: userDisplay
            };

            try {
                if (partnerId) {
                    await fetchJson(`/api/partners/${partnerId}`, {
                        method: "PUT",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                    alert(window.I18n?.t("partners.saveSuccess") || "Cập nhật thành công!");
                } else {
                    const res = await fetchJson("/api/partners", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                    alert(window.I18n?.t("partners.createSuccess") || "Tạo thành công!");
                    window.location.href = `/modules/Partners/detail.html?id=${res.id}`;
                    return;
                }
                loadPartner();
            } catch (err) {
                alert((window.I18n?.t("partners.saveFailed") || "Lưu thất bại: ") + err.message);
            }
        });

        document.getElementById("btnCancel").addEventListener("click", () => {
            if (confirm(window.I18n?.t("partners.confirmCancel") || "Bạn có chắc muốn hủy? Các thay đổi chưa lưu sẽ bị mất.")) {
                window.location.href = "/modules/Partners/index.html";
            }
        });

        document.getElementById("country").addEventListener("change", syncInvoiceLanguageFromCountry);

        loadPartner();

        document.addEventListener("languageChanged", () => {
            window.I18n?.updatePage();
        });
    </script>
</body>

</html>
