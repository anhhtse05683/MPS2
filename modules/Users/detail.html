<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chi tiết Người dùng</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <script src="/modules/assets/js/auth.js"></script>
  <script src="/modules/assets/js/i18n.js"></script>
</head>
<body class="p-3" style="background:#f8fafc;">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <a href="/modules/Users/index.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Quay lại</a>
    <div>
      <button id="btnSave" class="btn btn-primary btn-sm"><i class="bi bi-save me-1"></i>Lưu</button>
      <button id="btnCancel" class="btn btn-outline-secondary btn-sm"><i class="bi bi-x-lg me-1"></i>Hủy</button>
    </div>
  </div>

  <div class="card">
    <div class="card-header bg-primary text-white"><h5 class="mb-0"><i class="bi bi-person-badge me-2"></i>Thông tin Người dùng</h5></div>
    <div class="card-body">
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">Username <span class="text-danger">*</span></label>
          <input type="text" id="username" class="form-control" placeholder="Username" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">Họ tên <span class="text-danger">*</span></label>
          <input type="text" id="fullName" class="form-control" placeholder="Họ tên đầy đủ" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">Mật khẩu <span id="pwdRequired" class="text-danger">*</span></label>
          <input type="password" id="password" class="form-control" placeholder="Để trống nếu không đổi">
        </div>
        <div class="col-md-4">
          <label class="form-label">Email</label>
          <input type="email" id="email" class="form-control" placeholder="email@example.com">
        </div>
        <div class="col-md-4">
          <label class="form-label">Số điện thoại</label>
          <input type="text" id="phone" class="form-control" placeholder="SĐT">
        </div>
        <div class="col-md-4">
          <label class="form-label">Phòng ban</label>
          <select id="deptId" class="form-select"><option value="">-- Chọn --</option></select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Trạng thái</label>
          <select id="isActive" class="form-select">
            <option value="1">Hoạt động</option>
            <option value="0">Không hoạt động</option>
          </select>
        </div>
        <div class="col-12">
          <label class="form-label">Vai trò (Roles)</label>
          <div id="rolesContainer" class="d-flex flex-wrap gap-2"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const userId = params.get("id") ? parseInt(params.get("id")) : null;
    let roles = [], roleIds = [];

    async function fetchJson(url, opts = {}) {
      const res = await fetch(url, opts);
      if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || "Request failed"); }
      return res.json();
    }

    async function loadDepts() {
      const data = await fetchJson("/api/departments");
      const sel = document.getElementById("deptId");
      data.forEach(d => { const o = document.createElement("option"); o.value = d.id; o.textContent = d.name; sel.appendChild(o); });
    }

    async function loadRoles() {
      roles = await fetchJson("/api/roles");
      const container = document.getElementById("rolesContainer");
      container.innerHTML = "";
      roles.forEach(r => {
        const div = document.createElement("div");
        div.className = "form-check form-check-inline";
        div.innerHTML = `<input class="form-check-input" type="checkbox" id="role_${r.id}" value="${r.id}"> <label class="form-check-label" for="role_${r.id}">${r.name}</label>`;
        div.querySelector("input").onchange = () => updateRoleIds();
        container.appendChild(div);
      });
    }

    function updateRoleIds() {
      roleIds = roles.filter(r => document.getElementById("role_" + r.id)?.checked).map(r => r.id);
    }

    async function loadUser() {
      if (!userId) {
        document.getElementById("pwdRequired").style.display = "inline";
        return;
      }
      document.getElementById("pwdRequired").style.display = "none";
      document.getElementById("username").readOnly = true;
      try {
        const u = await fetchJson("/api/users/" + userId);
        document.getElementById("username").value = u.Username || "";
        document.getElementById("fullName").value = u.FullName || "";
        document.getElementById("email").value = u.Email || "";
        document.getElementById("phone").value = u.Phone || "";
        document.getElementById("deptId").value = u.DeptId || "";
        document.getElementById("isActive").value = u.IsActive ? "1" : "0";
        (u.roles || []).forEach(r => {
          const cb = document.getElementById("role_" + (r.RoleId || r.id));
          if (cb) cb.checked = true;
        });
        updateRoleIds();
      } catch (err) {
        alert("Lỗi: " + err.message);
        location.href = "/modules/Users/index.html";
      }
    }

    document.getElementById("btnSave").onclick = async () => {
      const username = document.getElementById("username").value.trim();
      const fullName = document.getElementById("fullName").value.trim();
      const password = document.getElementById("password").value;
      if (!username || !fullName) { alert("Vui lòng nhập Username và Họ tên"); return; }
      if (!userId && !password) { alert("Vui lòng nhập mật khẩu"); return; }

      const payload = {
        username: username,
        fullName: fullName,
        email: document.getElementById("email").value.trim() || null,
        phone: document.getElementById("phone").value.trim() || null,
        deptId: document.getElementById("deptId").value ? parseInt(document.getElementById("deptId").value) : null,
        isActive: document.getElementById("isActive").value === "1",
        roleIds: roleIds.length ? roleIds : [4]
      };
      if (password) payload.password = password;

      try {
        if (userId) {
          await fetchJson("/api/users/" + userId, { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
          alert("Cập nhật thành công!");
        } else {
          const res = await fetchJson("/api/users", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
          alert("Tạo thành công!");
          location.href = "/modules/Users/detail.html?id=" + res.id;
          return;
        }
        loadUser();
      } catch (err) { alert("Lỗi: " + err.message); }
    };

    document.getElementById("btnCancel").onclick = () => { if (confirm("Hủy không lưu?")) location.href = "/modules/Users/index.html"; };

    loadDepts();
    loadRoles().then(() => loadUser());
  </script>
</body>
</html>
