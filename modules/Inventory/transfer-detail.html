<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuyển kho</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="/modules/assets/js/auth.js"></script>
    <style>
        body { background: #f8fafc; padding: 1rem; }
        .card { border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); border: none; margin-bottom: 1rem; }
        .card-header { background: linear-gradient(135deg, #059669 0%, #047857 100%); color: white; border-radius: 16px 16px 0 0 !important; padding: 1rem 1.5rem; }
    </style>
</head>
<body>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <a href="transfers.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Quay lại</a>
        <button id="btnSave" class="btn btn-primary btn-sm"><i class="bi bi-save me-1"></i>Lưu</button>
    </div>
    <div class="card">
        <div class="card-header"><h5 class="mb-0"><i class="bi bi-arrow-left-right me-2"></i>Phiếu chuyển kho</h5></div>
        <div class="card-body">
            <div class="row g-3 mb-3">
                <div class="col-md-4"><label class="form-label">Từ kho <span class="text-danger">*</span></label><select id="fromWarehouseId" class="form-select" required></select></div>
                <div class="col-md-4"><label class="form-label">Đến kho <span class="text-danger">*</span></label><select id="toWarehouseId" class="form-select" required></select></div>
                <div class="col-md-4"><label class="form-label">Ngày chuyển <span class="text-danger">*</span></label><input type="date" id="transferDate" class="form-control" required></div>
                <div class="col-12"><label class="form-label">Ghi chú</label><input type="text" id="notes" class="form-control" placeholder="Ghi chú"></div>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h6 class="mb-0">Chi tiết</h6>
                <button id="btnAddLine" class="btn btn-sm btn-outline-primary"><i class="bi bi-plus me-1"></i>Thêm dòng</button>
            </div>
            <div class="table-responsive">
                <table class="table table-bordered table-sm">
                    <thead><tr><th>Loại</th><th>Mã</th><th>Tên</th><th>Số lượng</th><th></th></tr></thead>
                    <tbody id="linesBody"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script>
        let warehouses = [], items = [], lines = [];
        async function fetchJson(url, opts = {}) {
            const res = await fetch(url, opts);
            if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || "Request failed"); }
            return res.json();
        }
        async function loadWarehouses() {
            warehouses = await fetchJson("/api/warehouses/list");
            const fromSel = document.getElementById("fromWarehouseId");
            const toSel = document.getElementById("toWarehouseId");
            fromSel.innerHTML = toSel.innerHTML = "<option value=''>-- Chọn kho --</option>";
            warehouses.forEach(w => {
                const o1 = document.createElement("option"); o1.value = w.id; o1.textContent = w.code + " - " + w.name; fromSel.appendChild(o1);
                const o2 = document.createElement("option"); o2.value = w.id; o2.textContent = w.code + " - " + w.name; toSel.appendChild(o2);
            });
        }
        async function loadItems() {
            const prods = await fetchJson("/api/items?type=P");
            const mats = await fetchJson("/api/items?type=M");
            items = prods.map(p => ({ ...p, itemType: "P", itemId: p.id })).concat(mats.map(m => ({ ...m, itemType: "M", itemId: m.id })));
        }
        function addLine(item) {
            if (lines.some(l => l.itemType === item.itemType && l.itemId === item.itemId)) { alert("Đã thêm rồi"); return; }
            lines.push({ itemType: item.itemType, itemId: item.itemId, itemCode: item.code, itemName: item.name, quantity: 0 });
            renderLines();
        }
        function renderLines() {
            const tbody = document.getElementById("linesBody");
            tbody.innerHTML = lines.map((l, i) => `
                <tr>
                    <td><span class="badge ${l.itemType === 'P' ? 'bg-success' : 'bg-primary'}">${l.itemType === 'P' ? 'TP' : 'NVL'}</span></td>
                    <td>${l.itemCode}</td>
                    <td>${l.itemName}</td>
                    <td><input type="number" step="0.001" min="0" class="form-control form-control-sm text-end" data-idx="${i}" value="${l.quantity}"></td>
                    <td><button class="btn btn-sm btn-outline-danger" onclick="lines.splice(${i},1);renderLines()"><i class="bi bi-trash"></i></button></td>
                </tr>
            `).join("");
            tbody.querySelectorAll("input[data-idx]").forEach(inp => {
                inp.onchange = () => { lines[parseInt(inp.dataset.idx)].quantity = parseFloat(inp.value) || 0; };
            });
        }
        document.getElementById("btnAddLine").onclick = () => {
            const code = prompt("Nhập mã SP/NVL:");
            if (!code) return;
            const item = items.find(i => (i.code || "").toLowerCase() === (code || "").trim().toLowerCase());
            if (!item) { alert("Không tìm thấy: " + code); return; }
            addLine(item);
        };
        document.getElementById("btnSave").onclick = async () => {
            const fromWh = document.getElementById("fromWarehouseId").value;
            const toWh = document.getElementById("toWarehouseId").value;
            const date = document.getElementById("transferDate").value;
            if (!fromWh || !toWh || fromWh === toWh) { alert("Chọn từ kho và đến kho (khác nhau)"); return; }
            if (!date) { alert("Chọn ngày"); return; }
            const validLines = lines.filter(l => l.quantity > 0);
            if (!validLines.length) { alert("Thêm ít nhất một dòng có số lượng > 0"); return; }
            try {
                const res = await fetchJson("/api/stock-transfers", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        fromWarehouseId: parseInt(fromWh),
                        toWarehouseId: parseInt(toWh),
                        transferDate: date,
                        notes: document.getElementById("notes").value.trim() || null,
                        lines: validLines.map(l => ({ itemType: l.itemType, itemId: l.itemId, quantity: l.quantity }))
                    })
                });
                alert("Tạo phiếu thành công: " + (res.transferNumber || res.id));
                location.href = "transfers.html";
            } catch (err) { alert("Lỗi: " + err.message); }
        };
        document.getElementById("transferDate").value = new Date().toISOString().slice(0, 10);
        Promise.all([loadWarehouses(), loadItems()]).then(() => {});
    </script>
</body>
</html>
