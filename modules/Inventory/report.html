<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo cáo tồn kho theo tuần</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="/modules/assets/js/auth.js"></script>
    <style>
        body { background: #f8fafc; padding: 1rem; }
        .card { border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); border: none; }
        .card-header { background: linear-gradient(135deg, #059669 0%, #047857 100%); color: white; border-radius: 16px 16px 0 0 !important; padding: 1rem 1.5rem; }
        .table-report { font-size: 0.8rem; }
        .table-report th { background: #f1f5f9; font-weight: 600; white-space: nowrap; }
        .table-report td { vertical-align: middle; }
        .week-cell { min-width: 50px; text-align: right; }
        .item-type-p { color: #059669; } .item-type-m { color: #3b82f6; }
    </style>
</head>
<body>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <a href="index.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Quay lại</a>
    </div>
    <div class="card">
        <div class="card-header"><h5 class="mb-0"><i class="bi bi-bar-chart me-2"></i>Báo cáo tồn kho theo tuần</h5></div>
        <div class="card-body">
            <div class="d-flex gap-2 mb-3 flex-wrap align-items-center">
                <label>Năm</label><input type="number" id="year" class="form-control form-control-sm" style="width:90px;" value="">
                <label>Tuần</label><input type="number" id="fromWeek" class="form-control form-control-sm" style="width:70px;" placeholder="Từ" min="1" max="53">
                <span>-</span>
                <input type="number" id="toWeek" class="form-control form-control-sm" style="width:70px;" placeholder="Đến" min="1" max="53">
                <select id="warehouseId" class="form-select form-select-sm" style="width:180px;"><option value="">Tất cả kho</option></select>
                <button id="btnLoad" class="btn btn-primary btn-sm">Tải báo cáo</button>
            </div>
            <div class="table-responsive">
                <table class="table table-bordered table-report" id="reportTable">
                    <thead><tr id="theadRow"></tr></thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script>
        async function fetchJson(url, opts = {}) {
            const res = await fetch(url, opts);
            if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || "Request failed"); }
            return res.json();
        }
        async function loadWarehouses() {
            try {
                const list = await fetchJson("/api/warehouses/list");
                const sel = document.getElementById("warehouseId");
                list.forEach(w => { const o = document.createElement("option"); o.value = w.id; o.textContent = w.code + " - " + w.name; sel.appendChild(o); });
            } catch (_) {}
        }
        async function load() {
            const year = parseInt(document.getElementById("year").value) || new Date().getFullYear();
            const fromWeek = parseInt(document.getElementById("fromWeek").value) || 1;
            const toWeek = parseInt(document.getElementById("toWeek").value) || Math.min(fromWeek + 11, 52);
            const wh = document.getElementById("warehouseId").value;
            try {
                const params = new URLSearchParams({ year, fromWeek, toWeek });
                if (wh) params.append("warehouseId", wh);
                const data = await fetchJson("/api/stock-report-by-week?" + params);
                const thead = document.getElementById("theadRow");
                thead.innerHTML = "<th>Loại</th><th>Mã</th><th>Tên</th>" + (data.weekColumns || []).map(w => `<th class="week-cell">W${w}</th>`).join("");
                const tbody = document.getElementById("tbody");
                const stockByWeek = data.stockByWeek || {};
                tbody.innerHTML = (data.items || []).map(it => {
                    const itType = it.itemType || it.ItemType;
                    const itId = it.itemId ?? it.ItemId;
                    const key = `${itType}_${itId}`;
                    const row = stockByWeek[key] || {};
                    const cells = (data.weekColumns || []).map(w => {
                        const v = row[w];
                        return `<td class="week-cell">${v != null ? parseFloat(v).toLocaleString("en-US", {maximumFractionDigits: 2}) : "-"}</td>`;
                    }).join("");
                    return `<tr><td class="item-type-${(itType || "").toLowerCase()}">${itType === "P" ? "TP" : "NVL"}</td><td><strong>${it.code || ""}</strong></td><td>${it.name || ""}</td>${cells}</tr>`;
                }).join("");
                if (!data.items || !data.items.length) tbody.innerHTML = "<tr><td colspan='100' class='text-center text-muted py-4'>Chưa có dữ liệu</td></tr>";
            } catch (err) {
                document.getElementById("tbody").innerHTML = `<tr><td colspan="100" class="text-center text-danger py-4">${err.message}</td></tr>`;
            }
        }
        document.getElementById("year").value = new Date().getFullYear();
        document.getElementById("fromWeek").value = 1;
        document.getElementById("toWeek").value = 12;
        document.getElementById("btnLoad").onclick = load;
        loadWarehouses().then(load);
    </script>
</body>
</html>
