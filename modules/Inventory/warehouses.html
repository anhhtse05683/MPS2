<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="inventory.warehouses">Kho hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="/modules/assets/js/auth.js"></script>
    <script src="/modules/assets/js/i18n.js"></script>
    <style>
        body { background: #f8fafc; padding: 1rem; }
        .card { border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); border: none; }
        .card-header { background: linear-gradient(135deg, #059669 0%, #047857 100%); color: white; border-radius: 16px 16px 0 0 !important; padding: 1rem 1.5rem; }
        .badge-nvl { background: #3b82f6; } .badge-tp { background: #10b981; } .badge-wip { background: #f59e0b; }
    </style>
</head>
<body>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <a href="index.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i><span data-i18n="common.back">Quay lại</span></a>
        <button id="btnAdd" class="btn btn-primary btn-sm"><i class="bi bi-plus-lg me-1"></i><span data-i18n="inventory.addWarehouse">Thêm kho</span></button>
    </div>
    <div class="card">
        <div class="card-header"><h5 class="mb-0"><i class="bi bi-building me-2"></i><span data-i18n="inventory.warehouseList">Danh sách Kho hàng</span></h5></div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead><tr><th data-i18n="inventory.form.code">Mã</th><th data-i18n="inventory.form.name">Tên</th><th data-i18n="inventory.form.type">Loại</th><th data-i18n="inventory.form.address">Địa chỉ</th><th data-i18n="inventory.tableStatus">Trạng thái</th><th class="text-center" data-i18n="common.actions">Thao tác</th></tr></thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalEdit" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title" id="modalTitle" data-i18n="inventory.addWarehouse">Thêm kho</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <input type="hidden" id="editId">
                    <div class="mb-2"><label class="form-label"><span data-i18n="inventory.form.code">Mã kho</span> <span class="text-danger">*</span></label><input type="text" id="code" class="form-control" data-i18n="inventory.form.codePlaceholder" placeholder="VD: WH001"></div>
                    <div class="mb-2"><label class="form-label"><span data-i18n="inventory.form.name">Tên kho</span> <span class="text-danger">*</span></label><input type="text" id="name" class="form-control" data-i18n="inventory.form.namePlaceholder" placeholder="Tên kho"></div>
                    <div class="mb-2">
                        <label class="form-label" data-i18n="inventory.form.type">Loại kho</label>
                        <input type="text" id="type" class="form-control" list="typeSuggestions" data-i18n="inventory.form.typePlaceholder" placeholder="VD: NVL, TP, WIP...">
                        <datalist id="typeSuggestions">
                            <option value="NVL">NVL - Nguyên vật liệu</option>
                            <option value="TP">TP - Thành phẩm</option>
                            <option value="WIP">WIP - Bán thành phẩm</option>
                        </datalist>
                        <small class="text-muted" data-i18n="inventory.typeHint">Có thể chọn gợi ý hoặc nhập loại mới tùy ý</small>
                    </div>
                    <div class="mb-2"><label class="form-label" data-i18n="inventory.form.address">Địa chỉ</label><input type="text" id="address" class="form-control" data-i18n="inventory.form.addressPlaceholder" placeholder="Địa chỉ"></div>
                    <div class="mb-2"><label class="form-label" data-i18n="inventory.tableStatus">Trạng thái</label><select id="isActive" class="form-select"><option value="1" data-i18n="inventory.statusActive">Hoạt động</option><option value="0" data-i18n="inventory.statusInactive">Không hoạt động</option></select></div>
                </div>
                <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-i18n="common.cancel">Hủy</button><button type="button" class="btn btn-primary" id="btnSave" data-i18n="common.save">Lưu</button></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const canEdit = window.Auth?.hasPermission?.("inventory.edit") ?? true;
        const modal = new bootstrap.Modal(document.getElementById("modalEdit"));

        async function fetchJson(url, opts = {}) {
            const res = await fetch(url, opts);
            if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || "Request failed"); }
            return res.json();
        }

        function updateTypeSuggestions(data) {
            const dl = document.getElementById("typeSuggestions");
            const defaults = ["NVL", "TP", "WIP"];
            const fromDb = [...new Set((data || []).map(w => w.type).filter(Boolean))];
            const all = [...new Set([...defaults, ...fromDb])];
            dl.innerHTML = all.map(t => `<option value="${t}">`).join("");
        }

        async function load() {
            try {
                const data = await fetchJson("/api/warehouses");
                updateTypeSuggestions(data);
                const tbody = document.getElementById("tbody");
                tbody.innerHTML = data.length ? data.map(w => `
                    <tr>
                        <td><strong>${w.code || ""}</strong></td>
                        <td>${w.name || ""}</td>
                        <td><span class="badge ${w.type === 'NVL' ? 'bg-primary' : w.type === 'TP' ? 'bg-success' : w.type === 'WIP' ? 'bg-warning text-dark' : 'bg-secondary'}">${w.type || "-"}</span></td>
                        <td class="text-muted small">${w.address || "-"}</td>
                        <td><span class="badge ${w.isActive ? "bg-success" : "bg-secondary"}">${w.isActive ? (window.I18n?.t("inventory.statusActive") || "Hoạt động") : (window.I18n?.t("inventory.statusInactive") || "Tắt")}</span></td>
                        <td class="text-center" onclick="event.stopPropagation()">
                            ${canEdit ? `<button class="btn btn-sm btn-outline-primary me-1" onclick="edit(${w.id})"><i class="bi bi-pencil"></i></button><button class="btn btn-sm btn-outline-danger" onclick="del(${w.id})"><i class="bi bi-trash"></i></button>` : ""}
                        </td>
                    </tr>
                `).join("") : "<tr><td colspan='6' class='text-center text-muted py-4'>" + (window.I18n?.t("inventory.noWarehouses") || "Chưa có kho nào") + "</td></tr>";
            } catch (err) {
                document.getElementById("tbody").innerHTML = `<tr><td colspan="6" class="text-center text-danger py-4">${err.message}</td></tr>`;
            }
        }

        function openModal(isNew) {
            document.getElementById("modalTitle").textContent = isNew ? (window.I18n?.t("inventory.addWarehouse") || "Thêm kho") : (window.I18n?.t("inventory.editWarehouse") || "Sửa kho");
            document.getElementById("editId").value = "";
            document.getElementById("code").value = "";
            document.getElementById("name").value = "";
            document.getElementById("type").value = "";
            document.getElementById("address").value = "";
            document.getElementById("isActive").value = "1";
            document.getElementById("code").readOnly = !isNew;
            modal.show();
        }

        function edit(id) {
            fetchJson("/api/warehouses/" + id).then(w => {
                document.getElementById("modalTitle").textContent = window.I18n?.t("inventory.editWarehouse") || "Sửa kho";
                document.getElementById("editId").value = w.id;
                document.getElementById("code").value = w.code || "";
                document.getElementById("name").value = w.name || "";
                document.getElementById("type").value = w.type || "";
                document.getElementById("address").value = w.address || "";
                document.getElementById("isActive").value = w.isActive ? "1" : "0";
                document.getElementById("code").readOnly = true;
                modal.show();
            }).catch(err => alert((window.I18n?.t("inventory.loadError") || "Lỗi: ") + err.message));
        }

        async function del(id) {
            if (!confirm(window.I18n?.t("inventory.confirmDeleteWarehouse") || "Bạn có chắc muốn xóa kho này?")) return;
            try {
                await fetchJson("/api/warehouses/" + id, { method: "DELETE" });
                load();
            } catch (err) { alert((window.I18n?.t("users.deleteFailed") || "Xóa thất bại: ") + err.message); }
        }

        document.getElementById("btnAdd").onclick = () => openModal(true);
        document.getElementById("btnSave").onclick = async () => {
            const id = document.getElementById("editId").value;
            const payload = { code: document.getElementById("code").value.trim(), name: document.getElementById("name").value.trim(), type: document.getElementById("type").value || null, address: document.getElementById("address").value.trim() || null, isActive: document.getElementById("isActive").value === "1" };
            if (!payload.code || !payload.name) { alert(window.I18n?.t("inventory.validationCodeName") || "Vui lòng nhập Mã và Tên"); return; }
            try {
                if (id) {
                    await fetchJson("/api/warehouses/" + id, { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
                    alert(window.I18n?.t("common.updateSuccess") || "Cập nhật thành công!");
                } else {
                    await fetchJson("/api/warehouses", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
                    alert(window.I18n?.t("common.createSuccess") || "Tạo thành công!");
                }
                modal.hide();
                load();
            } catch (err) { alert((window.I18n?.t("inventory.loadError") || "Lỗi: ") + err.message); }
        };

        if (!canEdit) document.getElementById("btnAdd").style.display = "none";
        load();
        document.addEventListener("languageChanged", () => window.I18n?.updatePage?.());
    </script>
</body>
</html>
