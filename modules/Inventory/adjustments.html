<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phiếu điều chỉnh tồn kho</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="/modules/assets/js/auth.js"></script>
    <style>
        body { background: #f8fafc; padding: 1rem; }
        .card { border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); border: none; }
        .card-header { background: linear-gradient(135deg, #059669 0%, #047857 100%); color: white; border-radius: 16px 16px 0 0 !important; padding: 1rem 1.5rem; }
    </style>
</head>
<body>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <a href="index.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Quay lại</a>
        <a href="adjustment-detail.html" class="btn btn-primary btn-sm"><i class="bi bi-plus-lg me-1"></i>Tạo phiếu điều chỉnh</a>
    </div>
    <div class="card">
        <div class="card-header"><h5 class="mb-0"><i class="bi bi-sliders me-2"></i>Phiếu điều chỉnh tồn kho</h5></div>
        <div class="card-body">
            <div class="d-flex gap-2 mb-3">
                <select id="warehouseId" class="form-select form-select-sm" style="width:200px;"><option value="">Tất cả kho</option></select>
                <select id="status" class="form-select form-select-sm" style="width:150px;"><option value="">Tất cả</option><option value="DRAFT">DRAFT</option><option value="CONFIRM">CONFIRM</option></select>
                <button id="btnLoad" class="btn btn-primary btn-sm">Tải</button>
            </div>
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0 table-sm">
                    <thead><tr><th>Số phiếu</th><th>Kho</th><th>Ngày</th><th>Lý do</th><th>Trạng thái</th><th>Người tạo</th><th>Người duyệt</th><th>Thao tác</th></tr></thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script>
        const canConfirm = window.Auth?.hasPermission?.("inventory.confirm") ?? true;
        async function fetchJson(url, opts = {}) {
            const res = await fetch(url, opts);
            if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || "Request failed"); }
            return res.json();
        }
        async function loadWarehouses() {
            try {
                const list = await fetchJson("/api/warehouses/list");
                const sel = document.getElementById("warehouseId");
                list.forEach(w => { const o = document.createElement("option"); o.value = w.id; o.textContent = w.code; sel.appendChild(o); });
            } catch (_) {}
        }
        async function load() {
            try {
                const params = new URLSearchParams();
                const wh = document.getElementById("warehouseId").value;
                const status = document.getElementById("status").value;
                if (wh) params.append("warehouseId", wh);
                if (status) params.append("status", status);
                const data = await fetchJson("/api/stock-adjustments?" + params);
                const tbody = document.getElementById("tbody");
                tbody.innerHTML = data.length ? data.map(a => `
                    <tr>
                        <td><a href="adjustment-detail.html?id=${a.id}">${a.adjustmentNumber || a.AdjustmentNumber || ""}</a></td>
                        <td>${a.warehouseCode || a.WarehouseCode || ""}</td>
                        <td>${a.adjustmentDate ? new Date(a.adjustmentDate).toLocaleDateString("vi-VN") : "-"}</td>
                        <td class="small">${(a.reason || a.Reason || "").substring(0, 40)}${(a.reason || a.Reason || "").length > 40 ? "..." : ""}</td>
                        <td><span class="badge ${(a.status || a.Status) === 'CONFIRM' ? 'bg-success' : 'bg-warning text-dark'}">${a.status || a.Status || ""}</span></td>
                        <td class="small">${a.createdByName || a.CreatedByName || "-"} ${a.createdAt ? new Date(a.createdAt).toLocaleString("vi-VN") : ""}</td>
                        <td class="small">${a.confirmedByName || a.ConfirmedByName || "-"} ${a.confirmedAt ? new Date(a.confirmedAt).toLocaleString("vi-VN") : ""}</td>
                        <td>${canConfirm && (a.status || a.Status) === 'DRAFT' ? `<button class="btn btn-sm btn-success" onclick="confirmAdj(${a.id})">Duyệt</button>` : ""}</td>
                    </tr>
                `).join("") : "<tr><td colspan='8' class='text-center text-muted py-4'>Chưa có phiếu nào</td></tr>";
            } catch (err) {
                document.getElementById("tbody").innerHTML = `<tr><td colspan="8" class="text-center text-danger py-4">${err.message}</td></tr>`;
            }
        }
        async function confirmAdj(id) {
            if (!confirm("Xác nhận duyệt phiếu điều chỉnh này?")) return;
            try {
                await fetchJson("/api/stock-adjustments/" + id + "/confirm", { method: "POST", headers: { "Content-Type": "application/json" } });
                alert("Đã duyệt!");
                load();
            } catch (err) { alert("Lỗi: " + err.message); }
        }
        document.getElementById("btnLoad").onclick = load;
        loadWarehouses().then(load);
    </script>
</body>
</html>
