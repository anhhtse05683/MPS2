<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tồn kho</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="/modules/assets/js/auth.js"></script>
    <style>
        body { background: #f8fafc; padding: 1rem; }
        .card { border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); border: none; }
        .card-header { background: linear-gradient(135deg, #059669 0%, #047857 100%); color: white; border-radius: 16px 16px 0 0 !important; padding: 1rem 1.5rem; }
    </style>
</head>
<body>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <a href="index.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Quay lại</a>
        <button id="btnSyncMps" class="btn btn-outline-secondary btn-sm d-none" title="Tạm thời vô hiệu hóa - logic sai (gán số dư hiện tại thành opening)"><i class="bi bi-arrow-repeat me-1"></i>Đồng bộ MPS</button>
        <button id="btnSyncBalances" class="btn btn-outline-secondary btn-sm" title="Đồng bộ StockBalances từ StockTransactions (sửa lệch số dư)"><i class="bi bi-database-check me-1"></i>Đồng bộ số dư</button>
    </div>
    <div class="card">
        <div class="card-header"><h5 class="mb-0"><i class="bi bi-box-seam me-2"></i>Số dư tồn kho theo thời điểm</h5></div>
        <div class="card-body">
            <div class="row g-2 mb-3 align-items-end">
                <div class="col-auto">
                    <label class="form-label small mb-0">Kho</label>
                    <select id="warehouseId" class="form-select form-select-sm" style="width:200px;"><option value="">Tất cả kho</option></select>
                </div>
                <div class="col-auto">
                    <label class="form-label small mb-0">Mã mặt hàng</label>
                    <input type="text" id="itemCode" class="form-control form-control-sm" style="width:140px;" placeholder="VD: SP001, NVL001">
                </div>
                <div class="col-auto">
                    <label class="form-label small mb-0">Tại ngày</label>
                    <input type="date" id="balanceDate" class="form-control form-control-sm" style="width:150px;">
                </div>
                <div class="col-auto">
                    <button id="btnSearch" class="btn btn-primary btn-sm"><i class="bi bi-search me-1"></i>Tìm kiếm</button>
                </div>
            </div>
            <p class="small text-muted mb-2">Để trống tất cả = xem toàn bộ số dư tại thời điểm hiện tại. Chọn ngày trong quá khứ = số dư tại ngày đó.</p>
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0 table-sm">
                    <thead><tr><th>Kho</th><th>Loại</th><th>Mã</th><th>Tên</th><th class="text-end">Số dư</th><th>Tại ngày</th></tr></thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script>
        async function fetchJson(url, opts = {}) {
            const res = await fetch(url, opts);
            if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || "Request failed"); }
            return res.json();
        }
        async function loadWarehouses() {
            try {
                const list = await fetchJson("/api/warehouses/list");
                const sel = document.getElementById("warehouseId");
                list.forEach(w => { const o = document.createElement("option"); o.value = w.id; o.textContent = w.code + " - " + w.name; sel.appendChild(o); });
            } catch (_) {}
        }
        async function load() {
            try {
                const params = new URLSearchParams();
                const wh = document.getElementById("warehouseId").value;
                const code = document.getElementById("itemCode").value.trim();
                const date = document.getElementById("balanceDate").value;
                if (wh) params.append("warehouseId", wh);
                if (code) params.append("itemCode", code);
                if (date) params.append("date", date);
                const data = await fetchJson("/api/stock-balances?" + params);
                const tbody = document.getElementById("tbody");
                const balanceDate = date || new Date().toISOString().slice(0, 10);
                tbody.innerHTML = data.length ? data.map(s => `
                    <tr>
                        <td><small>${s.warehouseCode || ""}</small></td>
                        <td><span class="badge ${(s.itemType || s.ItemType) === 'P' ? 'bg-success' : 'bg-primary'}">${(s.itemType || s.ItemType) === 'P' ? 'TP' : 'NVL'}</span></td>
                        <td><strong>${s.itemCode || ""}</strong></td>
                        <td>${s.itemName || ""}</td>
                        <td class="text-end fw-semibold">${parseFloat(s.quantity || 0).toLocaleString("en-US", {maximumFractionDigits: 3})}</td>
                        <td class="small text-muted">${s.balanceDate ? new Date(s.balanceDate).toLocaleDateString("vi-VN") : (s.lastUpdatedAt ? new Date(s.lastUpdatedAt).toLocaleDateString("vi-VN") : balanceDate)}</td>
                    </tr>
                `).join("") : "<tr><td colspan='6' class='text-center text-muted py-4'>Không có số dư (hoặc mã mặt hàng không tồn tại)</td></tr>";
            } catch (err) {
                document.getElementById("tbody").innerHTML = `<tr><td colspan="6" class="text-center text-danger py-4">${err.message}</td></tr>`;
            }
        }
        document.getElementById("btnSearch").onclick = load;
        document.getElementById("btnSyncMps").onclick = async () => {
            if (!confirm("Cập nhật OpeningBalances (MPS) từ tồn kho thực tế? MPS sẽ hiển thị số dư khớp với Stock.")) return;
            try {
                await fetchJson("/api/opening-balance/sync-from-stock", { method: "POST" });
                alert("Đồng bộ thành công! MPS sẽ hiển thị số dư theo tồn thực tế.");
            } catch (e) { alert("Lỗi: " + e.message); }
        };
        document.getElementById("btnSyncBalances").onclick = async () => {
            if (!confirm("Đồng bộ StockBalances từ lịch sử phiếu (StockTransactions)? Sửa lệch số dư nếu có.")) return;
            try {
                await fetchJson("/api/stock-balances/sync-from-transactions", { method: "POST" });
                alert("Đồng bộ thành công!");
                load();
            } catch (e) { alert("Lỗi: " + e.message); }
        };
        loadWarehouses().then(load);
    </script>
</body>
</html>
