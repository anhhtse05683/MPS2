<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="inventory.adjustmentsTitle">Phiếu điều chỉnh tồn kho</title>
    <script src="/modules/assets/js/i18n.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="/modules/assets/js/auth.js"></script>
    <style>
        body { background: #f8fafc; padding: 1rem; }
        .card { border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); border: none; margin-bottom: 1rem; }
        .card-header { background: linear-gradient(135deg, #059669 0%, #047857 100%); color: white; border-radius: 16px 16px 0 0 !important; padding: 1rem 1.5rem; }
    </style>
</head>
<body>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <a href="adjustments.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i><span data-i18n="common.back">Quay lại</span></a>
        <button id="btnSave" class="btn btn-primary btn-sm"><i class="bi bi-save me-1"></i><span data-i18n="common.save">Lưu</span></button>
    </div>
    <div class="card">
        <div class="card-header"><h5 class="mb-0"><i class="bi bi-sliders me-2"></i>Phiếu điều chỉnh tồn kho</h5></div>
        <div class="card-body">
            <div class="row g-3 mb-3">
                <div class="col-md-4"><label class="form-label">Kho <span class="text-danger">*</span></label><select id="warehouseId" class="form-select" required></select></div>
                <div class="col-md-4"><label class="form-label">Ngày điều chỉnh <span class="text-danger">*</span></label><input type="date" id="adjustmentDate" class="form-control" required></div>
                <div class="col-md-4"><label class="form-label" data-i18n="inventory.reason">Lý do</label><input type="text" id="reason" class="form-control" data-i18n="inventory.reasonPlaceholder" placeholder="Lý do điều chỉnh"></div>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h6 class="mb-0" data-i18n="inventory.adjustmentDetail">Chi tiết điều chỉnh</h6>
                <button id="btnAddLine" class="btn btn-sm btn-outline-primary"><i class="bi bi-plus me-1"></i><span data-i18n="inventory.addLine">Thêm dòng</span></button>
            </div>
            <div class="table-responsive">
                <table class="table table-bordered table-sm">
                    <thead><tr><th>Loại</th><th>Mã</th><th>Tên</th><th>Tồn trước</th><th>Điều chỉnh (+/-)</th><th>Tồn sau</th><th></th></tr></thead>
                    <tbody id="linesBody"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script>
        const adjId = new URLSearchParams(location.search).get("id") ? parseInt(new URLSearchParams(location.search).get("id")) : null;
        let warehouses = [], stockBalances = [], items = [], lines = [];

        async function fetchJson(url, opts = {}) {
            const res = await fetch(url, opts);
            if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || "Request failed"); }
            return res.json();
        }
        async function loadWarehouses() {
            warehouses = await fetchJson("/api/warehouses/list");
            const sel = document.getElementById("warehouseId");
            sel.innerHTML = "<option value=''>-- Chọn kho --</option>";
            warehouses.forEach(w => { const o = document.createElement("option"); o.value = w.id; o.textContent = w.code + " - " + w.name; sel.appendChild(o); });
        }
        async function loadItems() {
            const prods = await fetchJson("/api/items?type=P");
            const mats = await fetchJson("/api/items?type=M");
            items = prods.map(p => ({ ...p, itemType: "P", itemId: p.id })).concat(mats.map(m => ({ ...m, itemType: "M", itemId: m.id })));
        }
        async function loadStock() {
            const wh = document.getElementById("warehouseId").value;
            if (!wh) { stockBalances = []; return; }
            stockBalances = await fetchJson("/api/stock-balances?warehouseId=" + wh);
        }
        document.getElementById("warehouseId").onchange = loadStock;

        function getStock(itemType, itemId) {
            const s = stockBalances.find(b => b.itemType === itemType && b.itemId === itemId);
            return s ? parseFloat(s.quantity) || 0 : 0;
        }

        function addLine(item) {
            const qtyBefore = getStock(item.itemType, item.itemId);
            lines.push({ itemType: item.itemType, itemId: item.itemId, itemCode: item.code, itemName: item.name, quantityBefore: qtyBefore, quantityAdjust: 0, quantityAfter: qtyBefore });
            renderLines();
        }

        function renderLines() {
            const tbody = document.getElementById("linesBody");
            tbody.innerHTML = lines.map((l, i) => `
                <tr>
                    <td><span class="badge ${l.itemType === 'P' ? 'bg-success' : 'bg-primary'}">${l.itemType === 'P' ? 'TP' : 'NVL'}</span></td>
                    <td>${l.itemCode}</td>
                    <td>${l.itemName}</td>
                    <td class="text-end">${l.quantityBefore.toLocaleString("en-US")}</td>
                    <td><input type="number" step="0.001" class="form-control form-control-sm text-end line-adjust" data-idx="${i}" value="${l.quantityAdjust}"></td>
                    <td class="text-end fw-semibold">${(l.quantityBefore + l.quantityAdjust).toLocaleString("en-US")}</td>
                    <td><button class="btn btn-sm btn-outline-danger" onclick="lines.splice(${i},1);renderLines()"><i class="bi bi-trash"></i></button></td>
                </tr>
            `).join("");
            tbody.querySelectorAll(".line-adjust").forEach(inp => {
                inp.onchange = () => {
                    const idx = parseInt(inp.dataset.idx);
                    lines[idx].quantityAdjust = parseFloat(inp.value) || 0;
                    lines[idx].quantityAfter = lines[idx].quantityBefore + lines[idx].quantityAdjust;
                    renderLines();
                };
            });
        }

        document.getElementById("btnAddLine").onclick = () => {
            const wh = document.getElementById("warehouseId").value;
            if (!wh) { alert(window.I18n?.t("inventory.selectWarehouseFirst") || "Chọn kho trước"); return; }
            const code = prompt("Nhập mã sản phẩm/NVL (VD: 589, NVL3):");
            if (!code) return;
            const item = items.find(i => (i.code || "").toLowerCase() === (code || "").trim().toLowerCase());
            if (!item) { alert((window.I18n?.t("inventory.notFound") || "Không tìm thấy") + ": " + code); return; }
            if (lines.some(l => l.itemType === item.itemType && l.itemId === item.itemId)) { alert(window.I18n?.t("inventory.alreadyAdded") || "Đã thêm rồi"); return; }
            addLine(item);
        };

        document.getElementById("btnSave").onclick = async () => {
            const warehouseId = document.getElementById("warehouseId").value;
            const adjustmentDate = document.getElementById("adjustmentDate").value;
            const reason = document.getElementById("reason").value.trim();
            if (!warehouseId || !adjustmentDate) { alert(window.I18n?.t("inventory.selectWarehouseDate") || "Chọn kho và ngày"); return; }
            const validLines = lines.filter(l => l.quantityAdjust !== 0);
            if (!validLines.length) { alert(window.I18n?.t("inventory.addOneLineAdj") || "Thêm ít nhất một dòng có số lượng điều chỉnh khác 0"); return; }
            const payload = {
                warehouseId: parseInt(warehouseId),
                adjustmentDate,
                reason: reason || null,
                lines: validLines.map(l => ({ itemType: l.itemType, itemId: l.itemId, quantityBefore: l.quantityBefore, quantityAdjust: l.quantityAdjust, quantityAfter: l.quantityAfter }))
            };
            try {
                const res = await fetchJson("/api/stock-adjustments", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
                alert((window.I18n?.t("common.createSuccess") || "Tạo phiếu thành công") + ": " + (res.adjustmentNumber || res.id));
                location.href = "adjustments.html";
            } catch (err) { alert((window.I18n?.t("inventory.loadError") || "Lỗi: ") + err.message); }
        };

        document.getElementById("adjustmentDate").value = new Date().toISOString().slice(0, 10);
        Promise.all([loadWarehouses(), loadItems()]).then(() => {
            if (adjId) fetchJson("/api/stock-adjustments/" + adjId).then(a => {
                document.getElementById("warehouseId").value = a.warehouseId || a.WarehouseId;
                document.getElementById("adjustmentDate").value = (a.adjustmentDate || a.AdjustmentDate || "").slice(0, 10);
                document.getElementById("reason").value = a.reason || a.Reason || "";
                loadStock().then(() => {
                    (a.lines || []).forEach(l => addLine({ itemType: l.itemType || l.ItemType, itemId: l.itemId || l.ItemId, code: l.itemCode || l.ItemCode, name: l.itemName || l.ItemName }));
                });
            }).catch(() => {});
        });
        document.addEventListener("languageChanged", () => window.I18n?.updatePage?.());
    </script>
</body>
</html>
