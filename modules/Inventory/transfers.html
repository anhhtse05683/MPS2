<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuyển kho</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="/modules/assets/js/auth.js"></script>
    <style>
        body { background: #f8fafc; padding: 1rem; }
        .card { border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); border: none; }
        .card-header { background: linear-gradient(135deg, #059669 0%, #047857 100%); color: white; border-radius: 16px 16px 0 0 !important; padding: 1rem 1.5rem; }
    </style>
</head>
<body>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <a href="index.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Quay lại</a>
        <a href="transfer-detail.html" class="btn btn-primary btn-sm"><i class="bi bi-plus-lg me-1"></i>Tạo phiếu chuyển kho</a>
    </div>
    <div class="card">
        <div class="card-header"><h5 class="mb-0"><i class="bi bi-arrow-left-right me-2"></i>Chuyển kho</h5></div>
        <div class="card-body">
            <div class="d-flex gap-2 mb-3">
                <select id="status" class="form-select form-select-sm" style="width:150px;"><option value="">Tất cả</option><option value="DRAFT">DRAFT</option><option value="CONFIRM">CONFIRM</option></select>
                <button id="btnLoad" class="btn btn-primary btn-sm">Tải</button>
            </div>
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0 table-sm">
                    <thead><tr><th>Số phiếu</th><th>Từ kho</th><th>Đến kho</th><th>Ngày</th><th>Trạng thái</th><th>Người tạo</th><th>Thao tác</th></tr></thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script>
        const canConfirm = window.Auth?.hasPermission?.("inventory.confirm") ?? true;
        async function fetchJson(url, opts = {}) {
            const res = await fetch(url, opts);
            if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || "Request failed"); }
            return res.json();
        }
        async function load() {
            try {
                const params = new URLSearchParams();
                const status = document.getElementById("status").value;
                if (status) params.append("status", status);
                const data = await fetchJson("/api/stock-transfers?" + params);
                const tbody = document.getElementById("tbody");
                tbody.innerHTML = data.length ? data.map(t => `
                    <tr>
                        <td><a href="transfer-detail.html?id=${t.id}">${t.transferNumber || t.TransferNumber || ""}</a></td>
                        <td>${t.fromCode || t.FromCode || ""} - ${t.fromName || t.FromName || ""}</td>
                        <td>${t.toCode || t.ToCode || ""} - ${t.toName || t.ToName || ""}</td>
                        <td>${t.transferDate ? new Date(t.transferDate).toLocaleDateString("vi-VN") : "-"}</td>
                        <td><span class="badge ${(t.status || t.Status) === 'CONFIRM' ? 'bg-success' : 'bg-warning text-dark'}">${t.status || t.Status || ""}</span></td>
                        <td class="small">${t.createdByName || t.CreatedByName || "-"}</td>
                        <td>${canConfirm && (t.status || t.Status) === 'DRAFT' ? `<button class="btn btn-sm btn-success" onclick="confirmTrf(${t.id})">Duyệt</button>` : ""}</td>
                    </tr>
                `).join("") : "<tr><td colspan='7' class='text-center text-muted py-4'>Chưa có phiếu nào</td></tr>";
            } catch (err) {
                document.getElementById("tbody").innerHTML = `<tr><td colspan="7" class="text-center text-danger py-4">${err.message}</td></tr>`;
            }
        }
        async function confirmTrf(id) {
            if (!confirm("Xác nhận duyệt phiếu chuyển kho?")) return;
            try {
                await fetchJson("/api/stock-transfers/" + id + "/confirm", { method: "POST", headers: { "Content-Type": "application/json" } });
                alert("Đã duyệt!");
                load();
            } catch (err) { alert("Lỗi: " + err.message); }
        }
        document.getElementById("btnLoad").onclick = load;
        load();
    </script>
</body>
</html>
