<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập | Weldex Vina ERP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { min-height: 100vh; background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 50%, #0369a1 100%); display: flex; align-items: center; justify-content: center; }
    .login-card { max-width: 400px; border-radius: 20px; box-shadow: 0 25px 50px rgba(0,0,0,0.2); }
    .login-header { background: linear-gradient(135deg, #0ea5e9, #0284c7); color: white; padding: 1.5rem; border-radius: 20px 20px 0 0; }
    .login-body { padding: 2rem; }
    .form-control:focus { border-color: #0ea5e9; box-shadow: 0 0 0 0.2rem rgba(14,165,233,0.25); }
    .btn-login { background: linear-gradient(135deg, #0ea5e9, #0284c7); border: none; padding: 0.6rem; }
  </style>
</head>
<body>
  <div class="card login-card w-100 mx-3">
    <div class="login-header text-center">
      <i class="bi bi-box-seam fs-1"></i>
      <h4 class="mt-2 mb-0">Weldex Vina ERP</h4>
      <small>Đăng nhập để tiếp tục</small>
    </div>
    <div class="login-body">
      <div id="errorMsg" class="alert alert-danger d-none" role="alert"></div>
      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label">Tên đăng nhập</label>
          <input type="text" id="username" class="form-control" placeholder="Username" required autocomplete="username">
        </div>
        <div class="mb-3">
          <label class="form-label">Mật khẩu</label>
          <input type="password" id="password" class="form-control" placeholder="Password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-login w-100 text-white">
          <i class="bi bi-box-arrow-in-right me-2"></i>Đăng nhập
        </button>
      </form>
      <p class="small text-muted mt-3 mb-0 text-center">Mặc định: admin / admin123</p>
    </div>
  </div>

  <script src="/modules/assets/js/auth.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const redirect = params.get("redirect") || "/modules/erp_index.html";

    if (window.Auth && window.Auth.isLoggedIn()) {
      window.location.href = redirect;
    }

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const errEl = document.getElementById("errorMsg");
      errEl.classList.add("d-none");

      try {
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (!res.ok) {
          errEl.textContent = data.error || "Đăng nhập thất bại";
          errEl.classList.remove("d-none");
          return;
        }
        window.Auth.setSession(data);
        window.location.href = redirect;
      } catch (err) {
        errEl.textContent = err.message || "Lỗi kết nối";
        errEl.classList.remove("d-none");
      }
    });
  </script>
</body>
</html>
