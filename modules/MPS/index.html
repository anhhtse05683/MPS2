    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ------------------ API + State ------------------
        const API_BASE = "";
        let state = {
            products: [],
            materials: [],
            productOpening: null,
            materialOpenings: {}, // materialId -> {week, year, balance}
            salesPlans: {}, // key -> qty (forecast từ SalesPlans)
            salesActual: {}, // key -> qty (từ hóa đơn CONFIRM)
            shipEditable: {}, // key -> boolean (true = cho nhập forecast)
            production: {}, // key -> qty for selected product
            purchase: {} // materialId -> { key -> qty }
        };
        let pendingShipChanges = {};
        let saveShipTimer = null;
        let mpsSocket = null;
        let realtimeReloadTimer = null;

        // ------------------ Helpers ------------------
        const weekKey = (week, year) => `${year}-W${String(week).padStart(2, "0")}`;

        // Tính tuần hiện tại trong năm (tính từ 1/1, tuần bắt đầu từ thứ 2)
        function getCurrentWeek() {
            const now = new Date();
            const year = now.getFullYear();
            const startOfYear = new Date(year, 0, 1); // 1/1 của năm hiện tại
            const dayOfYear = Math.floor((now - startOfYear) / (24 * 60 * 60 * 1000)) + 1; // Số ngày từ đầu năm (1-based)
            const dayOfWeek = startOfYear.getDay(); // 0 = Chủ nhật, 1 = Thứ 2, ...
            // Điều chỉnh để tuần bắt đầu từ thứ 2 (Monday = 1)
            const adjustedDayOfWeek = dayOfWeek === 0 ? 7 : dayOfWeek; // Chủ nhật = 7
            const weekNumber = Math.ceil((dayOfYear + (7 - adjustedDayOfWeek)) / 7);
            // Đảm bảo tuần trong khoảng 1-52
            return Math.min(Math.max(weekNumber, 1), 52);
        }

        // Tính toán giá trị mặc định cho fromWeek, toWeek, year
        function calculateDefaultWeekRange() {
            const now = new Date();
            const currentYear = now.getFullYear();
            const currentWeek = getCurrentWeek();

            // fromWeek = tuần hiện tại - 4
            let fromWeek = currentWeek - 4;
            let fromYear = currentYear;
            if (fromWeek < 1) {
                fromWeek = 52 + fromWeek; // Lùi về năm trước
                fromYear = currentYear - 1;
            }

            // toWeek = tuần hiện tại + 6
            let toWeek = currentWeek + 6;
            let toYear = currentYear;
            if (toWeek > 52) {
                toWeek = toWeek - 52; // Sang năm sau
                toYear = currentYear + 1;
            }

            return {
                fromWeek: Math.max(1, Math.min(fromWeek, 52)),
                fromYear,
                toWeek: Math.max(1, Math.min(toWeek, 52)),
                toYear
            };
        }

        async function fetchJson(url, options = {}) {
            const res = await fetch(API_BASE + url, {
                headers: { "Content-Type": "application/json" },
                ...options
            });
            if (!res.ok) throw new Error(await res.text() || res.statusText);
            if (res.status === 204) return null;
            return res.json();
        }

        function generateWeeks(startYear, startWeek, endYear, endWeek) {
            const weeks = [];
            let y = Number(startYear);
            let w = Number(startWeek);
            const safeGuard = 400; // avoid infinite loop
            let steps = 0;
            while (y < Number(endYear) || (y === Number(endYear) && w <= Number(endWeek))) {
                weeks.push({ week: w, year: y, label: `W${w}-${y}` });
                w += 1;
                if (w > 52) { // handle leap week if any, else reset at 52
                    w = 1;
                    y += 1;
                }
                steps += 1;
                if (steps > safeGuard) break;
            }
            return weeks;
        }

        function isSameWeek(week, year, target) {
            return target && target.week === week && target.year === year;
        }

        function formatNumber(value) {
            return Number(value || 0).toLocaleString("vi-VN", { minimumFractionDigits: 0 });
        }

        // ------------------ Data mapping ------------------
        function mapProduction(records) {
            const map = {};
            records.forEach(r => {
                map[weekKey(r.week, r.year)] = Number(r.qty || 0);
            });
            return map;
        }

        function mapPurchase(records) {
            const map = {};
            records.forEach(r => {
                const key = weekKey(r.week, r.year);
                if (!map[r.materialId]) map[r.materialId] = {};
                map[r.materialId][key] = Number((map[r.materialId][key] || 0) + (r.qty || 0));
            });
            return map;
        }

        function mapSalesPlans(records) {
            const map = {};
            records.forEach(r => {
                map[weekKey(r.week, r.year)] = Number(r.qty || 0);
            });
            return map;
        }

        function mapSalesActual(records) {
            const map = {};
            records.forEach(r => {
                map[weekKey(r.week, r.year)] = Number(r.qty || 0);
            });
            return map;
        }

        // Xác định SHIP_QTY và editable cho từng tuần: quá khứ + tuần hiện tại có CONFIRM = read-only
        function buildShipQtyAndEditable(weeks, salesActual, salesPlans, currentWeek, currentYear) {
            const ship = {};
            const editable = {};
            weeks.forEach(({ week, year }) => {
                const key = weekKey(week, year);
                const actual = Number(salesActual[key] || 0);
                const forecast = Number(salesPlans[key] || 0);

                const isPast = year < currentYear || (year === currentYear && week < currentWeek);
                const isCurrent = year === currentYear && week === currentWeek;

                if (isPast) {
                    ship[key] = actual;
                    editable[key] = false;
                } else if (isCurrent) {
                    if (actual > 0) {
                        ship[key] = actual;
                        editable[key] = false;
                    } else {
                        ship[key] = forecast;
                        editable[key] = true;
                    }
                } else {
                    ship[key] = forecast;
                    editable[key] = true;
                }
            });
            return { ship, editable };
        }

        // ------------------ Calculations ------------------
        function calculateProductRows(productId, weeks, userShip, productionMap) {
            const opening = state.productOpening;
            if (!weeks.length) return { ship: [], pro: [], balance: [] };

            const lastWeek = weeks[weeks.length - 1];
            const firstWeek = weeks[0];

            // Xác định điểm bắt đầu tính chuỗi balance
            let calcStartWeek = firstWeek.week;
            let calcStartYear = firstWeek.year;
            if (opening && (opening.year < firstWeek.year || (opening.year === firstWeek.year && opening.week <= firstWeek.week))) {
                calcStartWeek = opening.week;
                calcStartYear = opening.year;
            } else if (firstWeek.week > 1) {
                calcStartWeek = firstWeek.week - 1;
                calcStartYear = firstWeek.year;
            } else {
                calcStartWeek = 52;
                calcStartYear = firstWeek.year - 1;
            }

            const allWeeks = generateWeeks(calcStartYear, calcStartWeek, lastWeek.year, lastWeek.week);
            const currentWeek = getCurrentWeek();
            const currentYear = new Date().getFullYear();

            // Build ship for full range (allWeeks) - userShip chỉ có displayed weeks, cần ship từ opening đến tuần cuối
            const fullShip = {};
            allWeeks.forEach(w => {
                const key = weekKey(w.week, w.year);
                const actual = Number(state.salesActual[key] || 0);
                const forecast = Number(state.salesPlans[key] || 0);
                const isPast = w.year < currentYear || (w.year === currentYear && w.week < currentWeek);
                const isCurrent = w.year === currentYear && w.week === currentWeek;
                if (isPast) {
                    fullShip[key] = actual;
                } else if (isCurrent) {
                    fullShip[key] = actual > 0 ? actual : forecast;
                } else {
                    fullShip[key] = forecast;
                }
            });
            // Ưu tiên userShip cho displayed weeks (có thể user vừa edit trước khi state.salesPlans cập nhật)
            weeks.forEach(({ week, year }) => {
                const key = weekKey(week, year);
                if (userShip[key] !== undefined) fullShip[key] = userShip[key];
            });

            const balanceMap = {};
            let prevBalance = 0;

            allWeeks.forEach(w => {
                const key = weekKey(w.week, w.year);
                const shipQty = Number(fullShip[key] || 0);
                const proQty = Number(productionMap[key] || 0);

                if (opening && isSameWeek(w.week, w.year, opening)) {
                    prevBalance = opening.balance;
                } else if (opening && (w.year < opening.year || (w.year === opening.year && w.week < opening.week))) {
                    prevBalance = 0; // trước opening => 0
                } else {
                    prevBalance = prevBalance - shipQty + proQty;
                }
                balanceMap[key] = prevBalance;
            });

            const rows = { ship: [], pro: [], balance: [] };
            weeks.forEach(({ week, year }) => {
                const key = weekKey(week, year);
                rows.ship.push(Number(fullShip[key] ?? userShip[key] ?? 0));
                rows.pro.push(Number(productionMap[key] || 0));
                rows.balance.push(balanceMap[key] ?? 0);
            });

            return rows;
        }

        function calculateMaterialRows(productId, weeks, productionMap) {
            if (!weeks.length) return [];
            const lastWeek = weeks[weeks.length - 1];
            const firstWeek = weeks[0];

            return state.materials.map(mat => {
                const opening = state.materialOpenings[mat.id] || null;

                // Xác định điểm bắt đầu tính chuỗi balance
                let calcStartWeek = firstWeek.week;
                let calcStartYear = firstWeek.year;
                if (opening && (opening.year < firstWeek.year || (opening.year === firstWeek.year && opening.week <= firstWeek.week))) {
                    calcStartWeek = opening.week;
                    calcStartYear = opening.year;
                } else if (firstWeek.week > 1) {
                    calcStartWeek = firstWeek.week - 1;
                    calcStartYear = firstWeek.year;
                } else {
                    calcStartWeek = 52;
                    calcStartYear = firstWeek.year - 1;
                }

                const allWeeks = generateWeeks(calcStartYear, calcStartWeek, lastWeek.year, lastWeek.week);
                const balanceMap = {};
                const stockInMap = {};
                const stockOutMap = {};
                let prevBalance = 0;

                allWeeks.forEach(w => {
                    const key = weekKey(w.week, w.year);
                    const proQty = Number(productionMap[key] || 0);
                    const outQty = proQty * mat.consume;
                    const inQty = Number((state.purchase[mat.id] && state.purchase[mat.id][key]) || 0);

                    stockInMap[key] = inQty;
                    stockOutMap[key] = outQty;

                    if (opening && isSameWeek(w.week, w.year, opening)) {
                        prevBalance = opening.balance;
                    } else if (opening && (w.year < opening.year || (w.year === opening.year && w.week < opening.week))) {
                        prevBalance = 0;
                    } else {
                        prevBalance = prevBalance - outQty + inQty;
                    }
                    balanceMap[key] = prevBalance;
                });

                const stockIn = [];
                const stockOut = [];
                const balance = [];

                weeks.forEach(({ week, year }) => {
                    const key = weekKey(week, year);
                    stockIn.push(stockInMap[key] ?? 0);
                    stockOut.push(stockOutMap[key] ?? 0);
                    balance.push(balanceMap[key] ?? 0);
                });

                return { material: mat, stockIn, stockOut, balance };
            });
        }

        // ------------------ Rendering ------------------
        function renderHeaders(weeks, headerEl) {
            headerEl.innerHTML = "";
            const staticCols = headerEl.id === "productHeader"
                ? [window.I18n?.t("mps.product") || "Product", window.I18n?.t("mps.item") || "Item"]
                : [window.I18n?.t("mps.material") || "Material", window.I18n?.t("mps.item") || "Item"];
            staticCols.forEach(text => {
                const th = document.createElement("th");
                th.className = "text-center";
                th.textContent = text;
                headerEl.appendChild(th);
            });
            weeks.forEach(w => {
                const th = document.createElement("th");
                th.className = "text-center week-col";
                th.textContent = w.label;
                headerEl.appendChild(th);
            });
        }

        function renderProductTable(product, weeks, rows) {
            const body = document.getElementById("productBody");
            body.innerHTML = "";

            const items = [
                { label: window.I18n?.t("mps.shipQty") || "SHIP_QTY", values: rows.ship, type: "input" },
                { label: window.I18n?.t("mps.proQty") || "Pro_QTY", values: rows.pro },
                { label: window.I18n?.t("mps.balance") || "Balance", values: rows.balance, highlightNegative: true }
            ];

            items.forEach(item => {
                const tr = document.createElement("tr");
                const nameTd = document.createElement("td");
                // First column: Code / Name / Lead time
                if (item.label === "SHIP_QTY") {
                    nameTd.textContent = product.code;
                    tr.className = "tr-po"
                } else if (item.label === "Pro_QTY") {
                    nameTd.textContent = product.name || product.code;
                    tr.className = "tr-production"
                } else if (item.label === "Balance") {
                    const lt = product.leadTimeWeeks;
                    tr.className = "tr-balance"
                    nameTd.textContent = lt != null ? `LT: ${lt}weeks` : "";
                }
                nameTd.className = "fw-semibold text-center";

                tr.appendChild(nameTd);

                const itemTd = document.createElement("td");
                itemTd.textContent = item.label;
                itemTd.className = "text-center item-col";
                tr.appendChild(itemTd);

                item.values.forEach((val, idx) => {
                    const td = document.createElement("td");
                    td.className = "text-center week-col";
                    if (item.type === "input") {
                        const key = weekKey(weeks[idx].week, weeks[idx].year);
                        const canEdit = state.shipEditable[key];
                        if (canEdit) {
                            const input = document.createElement("input");
                            input.type = "number";
                            input.className = "form-control form-control-sm po-input";
                            input.value = val;
                            input.dataset.week = weeks[idx].week;
                            input.dataset.year = weeks[idx].year;
                            input.addEventListener("change", onShipQtyChange);
                            td.appendChild(input);
                        } else {
                            td.textContent = formatNumber(val);
                            td.classList.add("text-muted");
                            td.title = "Từ hóa đơn bán hàng (không sửa được)";
                        }
                    } else {
                        td.textContent = formatNumber(val);
                        if (item.highlightNegative && val < 0) td.classList.add("text-negative");
                    }
                    tr.appendChild(td);
                });
                body.appendChild(tr);
            });
        }

        function renderMaterialTable(materialRows, weeks) {
            const body = document.getElementById("materialBody");
            body.innerHTML = "";

            materialRows.forEach(row => {
                const items = [
                    { label: window.I18n?.t("mps.stockInQty") || "Stock_In_Qty", values: row.stockIn },
                    { label: window.I18n?.t("mps.stockOutQty") || "Stock_Out_Qty", values: row.stockOut },
                    { label: window.I18n?.t("mps.balance") || "Balance", values: row.balance, highlightNegative: true, secondary: true }
                ];

                items.forEach((item, itemIdx) => {
                    const tr = document.createElement("tr");

                    // First column for material rows: Code / Name / Consume per unit
                    const nameTd = document.createElement("td");
                    if (itemIdx === 0) {
                        // Material code
                        nameTd.textContent = row.material.code;
                    } else if (itemIdx === 1) {
                        // Material name
                        nameTd.textContent = row.material.name || row.material.code;
                    } else if (itemIdx === 2) {
                        // Consumption per finished product unit from BOM
                        const cons = row.material.consume;
                        nameTd.textContent = cons != null ? `QTY: ${cons}` : "";
                    }
                    nameTd.className = "fw-semibold text-center align-middle";
                    tr.appendChild(nameTd);

                    const itemTd = document.createElement("td");
                    itemTd.textContent = item.label;
                    itemTd.className = "text-center item-col";
                    tr.appendChild(itemTd);

                    item.values.forEach((val) => {
                        const td = document.createElement("td");
                        td.className = "text-center week-col";
                        td.textContent = formatNumber(val);
                        // Material: bôi đỏ khi balance < tồn kho an toàn (nếu chưa cấu hình thì dùng 0 = balance < 0)
                        if (item.highlightNegative) {
                            const safetyStock = Number(row.material.safetyStockQty ?? row.material.SafetyStockQty ?? 0);
                            const numVal = Number(val);
                            if (numVal < safetyStock) td.classList.add("text-negative");
                        }
                        tr.appendChild(td);
                    });

                    if (item.secondary) tr.classList.add("table-secondary-row");
                    body.appendChild(tr);
                });
            });
        }

        function updateOpeningInputs() {
            const open = state.productOpening;
            if (open) {
                document.getElementById("productOpeningWeek").value = open.week;
                document.getElementById("productOpeningYear").value = open.year;
                document.getElementById("productOpeningValue").value = open.balance;
            }
        }

        // ------------------ Events ------------------
        function onShipQtyChange(e) {
            const week = Number(e.target.dataset.week);
            const year = Number(e.target.dataset.year);
            const key = weekKey(week, year);
            if (!state.shipEditable[key]) return;
            state.salesPlans[key] = Number(e.target.value || 0);
            pendingShipChanges[key] = state.salesPlans[key];
            renderAll();
            scheduleSaveShipPlans();
        }

        function scheduleSaveShipPlans() {
            if (saveShipTimer) clearTimeout(saveShipTimer);
            saveShipTimer = setTimeout(async () => {
                const productId = Number(document.getElementById("productSelect").value);
                const plans = Object.entries(pendingShipChanges)
                    .filter(([k]) => state.shipEditable[k])
                    .map(([k, qty]) => {
                        const [yearStr, weekStr] = k.split("-W");
                        return { year: Number(yearStr), week: Number(weekStr), qty: Number(qty || 0) };
                    });
                if (!plans.length) return;
                try {
                    await fetchJson("/api/sales-plan", {
                        method: "PUT",
                        body: JSON.stringify({ productId, plans })
                    });
                    pendingShipChanges = {};
                } catch (err) {
                    console.error("Save SHIP_QTY failed", err);
                    alert(window.I18n?.t("mps.errorSaveShipQty") || "Lỗi lưu SHIP_QTY");
                }
            }, 600);
        }

        async function onApplyView() {
            const productId = Number(document.getElementById("productSelect").value);
            const openingWeek = Number(document.getElementById("productOpeningWeek").value);
            const openingYear = Number(document.getElementById("productOpeningYear").value);
            const openingValue = Number(document.getElementById("productOpeningValue").value);
            try {
                await fetchJson("/api/opening-balance", {
                    method: "PUT",
                    body: JSON.stringify({
                        itemType: "P",
                        itemId: productId,
                        startWeek: openingWeek,
                        startYear: openingYear,
                        balanceQty: openingValue
                    })
                });
                await loadDataAndRender(); // refresh
            } catch (err) {
                console.error(err);
                alert(window.I18n?.t("mps.errorSaveOpening") || "Không lưu được tồn kho ban đầu");
            }
        }

        // ------------------ Data loading ------------------
        async function loadProducts() {
            state.products = await fetchJson("/api/products");
            const select = document.getElementById("productSelect");
            select.innerHTML = "";
            state.products.forEach(p => {
                const opt = document.createElement("option");
                opt.value = p.id;
                opt.textContent = `${p.code} - ${p.name}`;
                select.appendChild(opt);
            });
        }

        async function loadDataForProduct(productId) {
            pendingShipChanges = {};
            const startWeek = Number(document.getElementById("startWeek").value);
            const startYear = Number(document.getElementById("startYear").value);
            const endWeek = Number(document.getElementById("endWeek").value);
            const endYear = Number(document.getElementById("endYear").value);

            // Cần biết opening của sản phẩm trước để quyết định range load dữ liệu
            const productOpening = await fetchJson(`/api/opening-balance/product/${productId}`);

            // Load từ tuần opening (nếu có) để đủ dữ liệu tính balance xuyên nhiều tuần
            // Nếu không có opening: lùi 1 tuần trước range để giảm thiếu hụt
            let loadFromWeek;
            let loadFromYear;
            if (productOpening) {
                loadFromWeek = productOpening.week;
                loadFromYear = productOpening.year;
            } else if (startWeek > 1) {
                loadFromWeek = startWeek - 1;
                loadFromYear = startYear;
            } else {
                loadFromWeek = 52;
                loadFromYear = startYear - 1;
            }

            // materials + sales plan + sales actual + production in parallel
            const [materials, salesPlans, salesActual, production] = await Promise.all([
                fetchJson(`/api/materials?productId=${productId}`),
                fetchJson(`/api/sales-plan?productId=${productId}&fromYear=${loadFromYear}&fromWeek=${loadFromWeek}&toYear=${endYear}&toWeek=${endWeek}`),
                fetchJson(`/api/sales-actual?productId=${productId}&fromYear=${loadFromYear}&fromWeek=${loadFromWeek}&toYear=${endYear}&toWeek=${endWeek}`),
                fetchJson(`/api/production?productId=${productId}&fromYear=${loadFromYear}&fromWeek=${loadFromWeek}&toYear=${endYear}&toWeek=${endWeek}`)
            ]);

            state.materials = materials;
            state.productOpening = productOpening ? { week: productOpening.week, year: productOpening.year, balance: Number(productOpening.balance) } : null;
            state.salesPlans = mapSalesPlans(salesPlans || []);
            state.salesActual = mapSalesActual(salesActual || []);
            state.production = mapProduction(production || []);
            console.log('[MPS] Production data loaded:', production);
            console.log('[MPS] Production map:', state.production);

            // material openings
            const openings = {};
            await Promise.all(
                materials.map(async (m) => {
                    const ob = await fetchJson(`/api/opening-balance/material/${m.id}`);
                    if (ob) openings[m.id] = { week: ob.week, year: ob.year, balance: Number(ob.balance) };
                })
            );
            state.materialOpenings = openings;

            // purchase for range (all materials) then filter
            // Load thêm 1 tuần trước range để có đủ dữ liệu tính balance
            const purchase = await fetchJson(`/api/purchase?fromYear=${loadFromYear}&fromWeek=${loadFromWeek}&toYear=${endYear}&toWeek=${endWeek}`);
            state.purchase = mapPurchase(purchase || []);

            updateOpeningInputs();
        }

        // ------------------ Realtime helpers (Socket.IO) ------------------
        function scheduleRealtimeReload() {
            if (realtimeReloadTimer) clearTimeout(realtimeReloadTimer);
            // Debounce để gộp nhiều update gần nhau
            realtimeReloadTimer = setTimeout(() => {
                console.log("[MPS] Realtime reload triggered");
                loadDataAndRender().catch(err => {
                    console.error("[MPS] Realtime reload failed", err);
                });
            }, 500);
        }

        function initRealtimeSocket() {
            if (typeof io === "undefined") {
                console.warn("[MPS] Socket.IO client not found");
                return;
            }
            if (mpsSocket) return; // already connected

            mpsSocket = io();
            console.log("[MPS] Socket connected, id=", mpsSocket.id);

            mpsSocket.on("connect", () => {
                console.log("[MPS] Socket connected");
            });
            mpsSocket.on("disconnect", () => {
                console.log("[MPS] Socket disconnected");
            });

            // Khi Production thay đổi (đơn sản xuất), MPS cần cập nhật lại
            mpsSocket.on("production:changed", (payload) => {
                try {
                    const currentProductId = Number(document.getElementById("productSelect").value);
                    if (payload && payload.productId && payload.productId !== currentProductId) {
                        // Không phải sản phẩm đang xem -> bỏ qua
                        return;
                    }
                } catch (_) {
                    // Nếu chưa có productSelect thì cứ reload
                }
                scheduleRealtimeReload();
            });

            // Khi Purchase thay đổi (PO CONFIRM ảnh hưởng stock_in), MPS cũng cần cập nhật
            mpsSocket.on("purchase:changed", () => {
                scheduleRealtimeReload();
            });

            // Khi Sales thay đổi (hóa đơn CONFIRM ảnh hưởng SHIP_QTY), MPS cần cập nhật
            mpsSocket.on("sales:changed", () => {
                scheduleRealtimeReload();
            });
        }

        // ------------------ Render orchestrator ------------------
        function renderAll() {
            const startWeek = Number(document.getElementById("startWeek").value);
            const startYear = Number(document.getElementById("startYear").value);
            const endWeek = Number(document.getElementById("endWeek").value);
            const endYear = Number(document.getElementById("endYear").value);
            const productId = Number(document.getElementById("productSelect").value);
            const product = state.products.find(p => p.id === productId);
            if (!product) return;

            const weeks = generateWeeks(startYear, startWeek, endYear, endWeek);
            const currentWeek = getCurrentWeek();
            const currentYear = new Date().getFullYear();

            const { ship: mergedShip, editable: shipEditable } = buildShipQtyAndEditable(
                weeks, state.salesActual, state.salesPlans, currentWeek, currentYear
            );
            state.shipEditable = shipEditable;

            renderHeaders(weeks, document.getElementById("productHeader"));
            renderHeaders(weeks, document.getElementById("materialHeader"));

            const productRows = calculateProductRows(productId, weeks, mergedShip, state.production);
            renderProductTable(product, weeks, productRows);

            const materialRows = calculateMaterialRows(productId, weeks, state.production);
            renderMaterialTable(materialRows, weeks);
        }

        async function loadDataAndRender() {
            const productId = Number(document.getElementById("productSelect").value);
            if (!productId) return;
            await loadDataForProduct(productId);
            renderAll();
        }

        // ------------------ Init ------------------
        function initScrollSync() {
            const productWrap = document.getElementById("productTableWrapper");
            const materialWrap = document.getElementById("materialTableWrapper");
            let syncing = false;
            const linkScroll = (source, target) => {
                source.addEventListener("scroll", () => {
                    if (syncing) return;
                    syncing = true;
                    target.scrollLeft = source.scrollLeft;
                    syncing = false;
                });
            };
            if (productWrap && materialWrap) {
                linkScroll(productWrap, materialWrap);
                linkScroll(materialWrap, productWrap);
            }
        }

        async function init() {
            // Set giá trị mặc định cho tuần/năm dựa trên tuần hiện tại
            const defaultRange = calculateDefaultWeekRange();
            document.getElementById("startWeek").value = defaultRange.fromWeek;
            document.getElementById("startYear").value = defaultRange.fromYear;
            document.getElementById("endWeek").value = defaultRange.toWeek;
            document.getElementById("endYear").value = defaultRange.toYear;

            // Set giá trị mặc định cho opening balance (tuần hiện tại - 4, năm hiện tại)
            const now = new Date();
            const currentYear = now.getFullYear();
            const currentWeek = getCurrentWeek();
            let openingWeek = currentWeek - 4;
            let openingYear = currentYear;
            if (openingWeek < 1) {
                openingWeek = 52 + openingWeek;
                openingYear = currentYear - 1;
            }
            document.getElementById("productOpeningWeek").value = Math.max(1, Math.min(openingWeek, 52));
            document.getElementById("productOpeningYear").value = openingYear;

            await loadProducts();
            document.getElementById("applyView").addEventListener("click", onApplyView);
            document.getElementById("productSelect").addEventListener("change", () => {
                // Khi đổi sản phẩm, load lại dữ liệu; socket listener vẫn giữ nguyên
                loadDataAndRender();
            });
            initScrollSync();
            initRealtimeSocket();
            await loadDataAndRender();
        }

        // Listen for language changes to re-render
        document.addEventListener('languageChanged', () => {
            renderAll();
        });

        document.addEventListener("DOMContentLoaded", async () => {
            // Wait for i18n to be ready
            await new Promise(resolve => {
                if (window.I18n && window.I18n.translations[window.I18n.currentLang]) {
                    resolve();
                } else {
                    const checkInterval = setInterval(() => {
                        if (window.I18n && window.I18n.translations[window.I18n.currentLang]) {
                            clearInterval(checkInterval);
                            resolve();
                        }
                    }, 100);
                    setTimeout(() => {
                        clearInterval(checkInterval);
                        resolve(); // Timeout after 2 seconds
                    }, 2000);
                }
            });

            init().catch(err => {
                console.error(err);
                alert(window.I18n?.t("mps.errorLoadData") || "Không tải được dữ liệu khởi động");
            });
        });
    </script>
</body>
